name: Universal Engineering Harness CI/CD

on:
  push:
    branches: [main, master, Branch1]
  pull_request:
    branches: [main, master, Branch1]
  workflow_dispatch:

jobs:
  harness-quality-gates:
    name: ⚡ Universal Harness 6 Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Gate 1 & 2 - Structure & TypeScript Strict Check
        run: |
          python3 .harness/scripts/verify-harness.py
          pnpm typecheck

      - name: Gate 3 - ESLint Cleanliness
        run: pnpm lint

      - run: cd backend && npx prisma generate

      - name: Gate 4 & 5 - TDD Ratio & 100% Unit Test Coverage Gate (M-COV)
        run: |
          cd backend && pnpm test:coverage
          python3 ../.harness/sensors/m-cov.py coverage/cobertura-coverage.xml
          python3 ../.harness/sensors/m-tdd.py src

      - name: Gate 6 - Hexagonal Architecture Verification (M-HEX)
        run: |
          cd backend && npx depcruise --output-type json src > ../depcruise-report.json
          python3 ../.harness/sensors/m-hex.py depcruise-report.json

      - name: 🎉 Universal Harness Runner Summary
        run: python3 .harness/harness-runner.py

      - name: 📈 DORA Metrics Collection & Exporter (M-DORA)
        if: always()
        env:
          DORA_METRICS_ENDPOINT: ${{ secrets.DORA_METRICS_ENDPOINT }}
          CI_JOB_STATUS: ${{ job.status }}
        run: python3 .harness/sensors/m-dora.py
